<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animated Bouquet</title>

    <meta name="description" content="Animated SVG bouquet composition.">
</head>

<body>

    <a href="#main-content">Skip to main content</a>

    <main id="main-content">

        <!-- ========================================================= -->
        <!-- Scene -->
        <!-- ========================================================= -->

        <section
            id="scene"
            aria-labelledby="scene-title"
            role="img">

            <h1 id="scene-title">
                Animated Floral Bouquet
            </h1>

            <!-- ===================================================== -->
            <!-- Background Layer -->
            <!-- ===================================================== -->

            <div
                id="background-layer"
                aria-hidden="true">

                <svg
                    id="background-svg"
                    viewBox="0 0 1080 1920"
                    xmlns="http://www.w3.org/2000/svg"
                    focusable="false"
                    aria-hidden="true"
                    preserveAspectRatio="xMidYMid slice">

                    <defs>

                        <!-- Background -->
                        <radialGradient id="background-gradient"></radialGradient>

                        <!-- Ambient -->
                        <filter id="ambient-glow"></filter>

                        <!-- Bloom -->
                        <filter id="bloom-filter"></filter>

                        <!-- Soft Blur -->
                        <filter id="soft-blur"></filter>

                        <!-- Vignette -->
                        <radialGradient id="vignette-gradient"></radialGradient>

                    </defs>

                    <g id="background-render-layer"></g>

                    <g id="lighting-render-layer"></g>

                    <g id="vignette-render-layer"></g>

                </svg>

            </div>

            <!-- ===================================================== -->
            <!-- Particle Layer -->
            <!-- ===================================================== -->

            <div
                id="particle-layer"
                aria-hidden="true">

                <svg
                    id="particle-svg"
                    viewBox="0 0 1080 1920"
                    xmlns="http://www.w3.org/2000/svg"
                    preserveAspectRatio="xMidYMid slice"
                    focusable="false"
                    aria-hidden="true">

                    <defs>

                        <filter id="particle-glow"></filter>

                    </defs>

                    <g id="particle-container"></g>

                    <g id="firefly-container"></g>

                </svg>

            </div>

            <!-- ===================================================== -->
            <!-- Message Layer -->
            <!-- ===================================================== -->

            <section
                id="message-layer"
                aria-label="Animated message">

                <header id="message-container">

                    <h2 id="headline"></h2>

                    <p id="subheadline"></p>

                </header>

            </section>

            <!-- ===================================================== -->
            <!-- Bouquet Layer -->
            <!-- ===================================================== -->

            <section
                id="bouquet-layer"
                aria-label="Animated bouquet">

                <svg
                    id="bouquet-svg"
                    viewBox="0 0 1080 1920"
                    xmlns="http://www.w3.org/2000/svg"
                    preserveAspectRatio="xMidYMid meet"
                    role="presentation"
                    focusable="false"
                    aria-hidden="true">

                    <defs>

                        <filter id="flower-glow"></filter>

                        <filter id="petal-bloom"></filter>

                        <filter id="stem-softening"></filter>

                        <filter id="leaf-glow"></filter>

                    </defs>

                    <!-- Bouquet Root -->

                    <g id="bouquet-root">

                        <!-- Stems -->

                        <g id="stem-layer"></g>

                        <!-- Leaves -->

                        <g id="leaf-layer"></g>

                        <!-- Flower Geometry -->

                        <g id="flower-layer"></g>

                        <!-- Flower Centers -->

                        <g id="flower-center-layer"></g>

                        <!-- Highlight Effects -->

                        <g id="highlight-layer"></g>

                        <!-- Ambient Glow -->

                        <g id="glow-layer"></g>

                    </g>

                </svg>

            </section>

            <!-- ===================================================== -->
            <!-- Overlay Layer -->
            <!-- ===================================================== -->

            <div
                id="overlay-layer"
                aria-hidden="true">

                <svg
                    id="overlay-svg"
                    viewBox="0 0 1080 1920"
                    xmlns="http://www.w3.org/2000/svg"
                    preserveAspectRatio="xMidYMid meet">

                    <g id="overlay-effects"></g>

                </svg>

            </div>

            <!-- ===================================================== -->
            <!-- Watermark -->
            <!-- ===================================================== -->

            <footer
                id="watermark-layer"
                aria-label="Creator attribution">

                <div id="watermark-container">

                    <svg
                        id="watermark-svg"
                        viewBox="0 0 400 160"
                        xmlns="http://www.w3.org/2000/svg"
                        role="img"
                        aria-labelledby="watermark-title">

                        <title id="watermark-title">
                            Watermark
                        </title>

                        <g id="watermark-icon"></g>

                        <g id="watermark-text"></g>

                    </svg>

                </div>

            </footer>

        </section>

    </main>

</body>
</html>
